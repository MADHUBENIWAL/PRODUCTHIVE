<html>
    <head>
        <title>
            PRODUCT HIVE 
        </title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }
            
            /* Navbar */
            .nav{
                background-color: #222;
                padding: 15px;
            }
            
            .nav ul{
                display: flex;
                align-items: center;
                list-style: none;
            }
            
            .nav h4{
                color: white;
                margin-right: auto;
                font-size: 22px;
            }
            
            .nav ul li{
                margin-left: 20px;
            }
            
            .nav ul li a{
                text-decoration: none;
                color: white;
                font-size: 16px;
                transition: 0.3s;
            }
            
            .nav ul li a:hover{
                color: #f39c12;
            }
            
            /* Product Details Section */
            .view{
                width: 350px;
                margin: 80px auto;
                padding: 25px;
                border-radius: 10px;
                background-color: #f4f4f4;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            }
            
            .view h2{
                text-align: center;
                margin-bottom: 20px;
            }
            
            .view p{
                font-size: 18px;
                margin: 10px 0;
            }
            
            .view span{
                font-weight: bold;
                color: #333;
            }
            </style>
    </head>
    <body>
        <header class="nav">
            <ul>
                <h4>Product Hive</h4>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Product</a></li>
                <li><a href="star-rated.html">Star Rated</a></li>
            </ul>
        </header>
        <div class="view">
            <h2>Product Details</h2>
            <p>ID: <span id="id"></span></p>
            <p>Name: <span id="name"></span></p>
            <p>Category: <span id="category"></span></p>
            <p>Price: <span id="price"></span></p>
            <p>Rating: <span id="rating"></span></p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
